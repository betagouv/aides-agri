{% extends "dsfr/header.html" %}

{% load i18n dsfr_tags %}

{% block header_tools %}
<button type="button" class="fr-btn fr-icon-theme-fill fr-btn--icon-left"
        aria-controls="fr-theme-modal" data-fr-opened="false"
>
  Paramètres d'affichage
</button>
{% endblock header_tools %}

{% block main_menu %}
<div class="fr-header__menu fr-modal"
     id="fr-menu-mobile"
     aria-labelledby="fr-btn-menu-mobile">
  <div class="fr-container">
    <button class="fr-btn--close fr-btn" aria-controls="fr-menu-mobile">
      {% translate "Close" %}
    </button>
    <div class="fr-header__menu-links">
    </div>
    {% translate "Main menu" as main_menu_label %}
    <nav role="navigation"
         class="fr-nav"
         id="fr-navigation"
         aria-label="{{ main_menu_label }}">
      <ul class="fr-nav__list">
        <li class="fr-nav__item">
          <a class="fr-nav__link" href="{% url 'demo:parcours' %}" target="_self">Démo Parcours</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
{% endblock main_menu %}
