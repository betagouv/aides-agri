{% extends "ui/base.html" %}

{% load dsfr_tags %}

{% block content %}
<div class="fr-container">

    <div class="fr-grid-col">
      <h1>{{ question.texte }}</h1>

    </div>
  </div>
</div>
{% endblock content %}
